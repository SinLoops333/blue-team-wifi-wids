# Copy to config/wids.yaml and customize.
# Credentials come from .env (PINEAPPLE_*); this file holds non-secret settings.

capture:
  # Mark VII recon radio is usually wlan1 (already Mode:Monitor).
  # Use "auto" to pick the first monitor-mode iface.
  interface: wlan1
  snaplen: 512                 # bytes per frame (512+ recommended for IE fingerprints)
  ssh_timeout: 30
  channel: null                # e.g. 11 to pin during Open999 lab tests

# BSSIDs / SSIDs you own — never treated as rogue/evil-twin.
# Always include the Pineapple's own radio MACs so PineAP is not self-flagged.
# MAC addresses MUST be quoted (colons are special in YAML).
allowlist:
  bssids:
    # - "00:13:37:be:ef:00"   # pineapple
    # - "28:ee:52:01:f4:ab"   # your own AP
  ssids: []

detectors:
  deauth:
    window_seconds: 10
    threshold: 20              # deauth/disassoc frames in window -> alert
    ignore_broadcast_source: true
  evil_twin:
    enabled: true
  beacon_clone:
    enabled: true
    stabilize_count: 3       # identical IE fingerprints before lock
    tsf_min_samples: 4
    tsf_max_backward_us: 1000000
  karma:
    window_seconds: 60
    min_ssids_per_bssid: 5     # probe responses for this many SSIDs
  pmkid:
    enabled: true
  handshake_harvest:
    deauth_then_eapol_window: 15  # seconds between deauth and EAPOL

anomaly:
  enabled: true
  window_seconds: 30
  contamination: 0.05
  min_train_windows: 20
  model_path: models/baseline.pkl
  inventory_path: models/ap_inventory.json

dashboard:
  host: 127.0.0.1
  port: 8080

store:
  db_path: data/events.db

alerts:
  dedup_seconds: 60            # suppress identical alerts within this window
  # Known-noisy lab BSSIDs / alert types (optional SOC polish)
  suppress_bssids: []
  # suppress_ssids: ["Guest_Noisy"]
  suppress_types: []
  # severity_overrides:
  #   anomaly: low
  #   deauth_flood: high

# Dual-radio / multi-channel fusion (Mark VII: second monitor radio)
# Off by default — enable when wlan2 (or another radio) is in monitor mode.
fusion:
  enabled: false
  secondary_interface: auto    # or e.g. wlan2
  # secondary_channel: 6       # pin secondary; if omitted, hop across hop_channels
  hop_channels: [1, 6, 11]
  hop_seconds: 2.0
  disagreement_window_seconds: 30

# Owned honeypot — classify clients that probe/auth YOUR SSIDs (not KARMA)
honeypot:
  enabled: false
  ssids: []                   # e.g. ["Open999"] — must be networks you own
  bssids: []
  window_seconds: 60
  burst_probe_threshold: 12   # honeypot probes / 10s → recon burst alert
  min_probes_for_ml: 5
  contamination: 0.08
  model_path: models/honeypot_client.pkl

# Concept drift — lock a quiet baseline, alert + optionally adapt when RF stats shift
drift:
  enabled: true
  reference_windows: 40
  recent_windows: 20
  min_recent: 15
  psi_threshold: 0.25
  mean_shift_threshold: 2.5
  adapt: true
  adapt_fraction: 0.25
  alert_cooldown_seconds: 120

# Owned-device probe privacy (list YOUR phone/laptop MACs only)
privacy:
  enabled: false
  owned_clients: []            # e.g. ["aa:bb:cc:dd:ee:ff"]
  # score_all_unicast: false   # dangerous — leave false unless lab-isolated
  window_seconds: 600
  unique_ssid_threshold: 8

# Dual-radio RSSI localization on a lab floorplan (meters)
localization:
  enabled: false
  window_seconds: 15
  alert_cooldown_seconds: 60
  ref_rssi: -40
  path_loss_exp: 2.5
  sensors:
    - {radio_id: primary, x: 0, y: 0}
    - {radio_id: secondary, x: 10, y: 0}
